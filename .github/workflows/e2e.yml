name: Playwright E2E Launch Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install root dependencies
      run: npm ci

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Build Database
      run: |
        # Run verify database check to construct navigator DB
        node src/scratch/verifyDatabase.js || node src/scratch/verify_requirements.js || true

    - name: Run CA Coverage Audit
      run: npm run audit:ca-coverage

    - name: Run SEO Launch Audit
      run: npm run audit:seo-launch-ca

    - name: Install Playwright Browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps chromium

    - name: Run Playwright tests
      working-directory: ./frontend
      run: npm run test:e2e

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30
